<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Isolate View</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #08111f;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
      }

      .back-link {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 20;
        padding: 10px 14px;
        color: rgba(228, 241, 255, 0.92);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: rgba(9, 18, 32, 0.58);
        border: 1px solid rgba(128, 177, 232, 0.22);
        border-radius: 999px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 18px rgba(76, 148, 235, 0.12);
      }

      .detail-label {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 20;
        color: rgba(168, 198, 230, 0.82);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
      }

      .dg.ac {
        top: 50% !important;
        right: 18px !important;
        bottom: auto !important;
        transform: translateY(-50%);
      }

      .startup-warning {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        z-index: 40;
        max-width: min(720px, calc(100vw - 32px));
        padding: 12px 16px;
        color: rgba(241, 246, 255, 0.96);
        font-size: 13px;
        line-height: 1.5;
        background: rgba(7, 16, 30, 0.88);
        border: 1px solid rgba(118, 164, 214, 0.28);
        border-radius: 14px;
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(12px);
      }

      .startup-warning code {
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 12px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="house-detail-page house-isolate-page">
    <div id="root"></div>
    <div id="startup-warning" class="startup-warning" hidden></div>
    <a class="back-link" href="./index.html">Back To City</a>
    <div class="detail-label">House Isolate View</div>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
    <script>
      const startupWarning = document.getElementById('startup-warning');

      function showStartupWarning(message) {
        if (!startupWarning) return;
        startupWarning.innerHTML = message;
        startupWarning.hidden = false;
      }

      if (window.location.protocol === 'file:') {
        showStartupWarning(
          '当前页面不要直接双击打开。请在这个目录启动本地服务器后访问 <code>http://127.0.0.1:8000/house-isolate.html</code>，否则浏览器会拦截模块和本地 <code>.glb</code> 模型加载。'
        );
      }
    </script>
    <script type="module" src="./house-detail.js"></script>
  </body>
</html>
