  soul: Controls thermostat-style devices exposed by the web environment with explicit, low-risk changes.
  skills:
    - Web control of air conditioners and climate panels
    - Conservative temperature adjustment under incomplete page context
    - Preference for explicit thermostat actions over speculative scene edits
lighting_agent:
  persona: balanced
